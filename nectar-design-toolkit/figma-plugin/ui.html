<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
      padding: 16px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--figma-color-border);
    }
    
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
    }
    
    .status-dot.connected {
      background: #44ff44;
    }
    
    .status-text {
      font-size: 11px;
      color: var(--figma-color-text-secondary);
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: var(--figma-color-text-secondary);
    }
    
    .connection-controls {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #FF90E8;
      color: #000;
    }
    
    .btn-primary:hover {
      background: #FFB5EF;
    }
    
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
    }
    
    .btn-secondary:hover {
      background: var(--figma-color-bg-hover);
    }
    
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .log-container {
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid var(--figma-color-border);
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 10px;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-command {
      color: #FF90E8;
      font-weight: 600;
    }
    
    .log-success {
      color: #44ff44;
    }
    
    .log-error {
      color: #ff4444;
    }
    
    .log-time {
      color: var(--figma-color-text-tertiary);
      margin-right: 8px;
    }
    
    .info-box {
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      padding: 12px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    
    .info-label {
      color: var(--figma-color-text-secondary);
    }
    
    .info-value {
      font-weight: 500;
    }
    
    .empty-log {
      text-align: center;
      color: var(--figma-color-text-tertiary);
      padding: 24px;
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    .quick-action {
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      border: none;
      color: var(--figma-color-text);
    }
    
    .quick-action:hover {
      background: var(--figma-color-bg-hover);
    }
    
    .quick-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .quick-action-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .quick-action-label {
      font-size: 10px;
      color: var(--figma-color-text-secondary);
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--figma-color-border);
      text-align: center;
      font-size: 10px;
      color: var(--figma-color-text-tertiary);
    }
    
    .error-message {
      background: #ff444420;
      border: 1px solid #ff4444;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">🍯 Nectar DS Builder</span>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Disconnected</span>
    </div>
  </div>

  <div id="errorBox" class="error-message" style="display: none;"></div>

  <div class="section">
    <div class="section-title">Connection</div>
    <div class="connection-controls">
      <button class="btn-primary" id="connectBtn" onclick="connect()">Connect</button>
      <button class="btn-secondary" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">File Info</div>
    <div class="info-box" id="fileInfo">
      <div class="info-row">
        <span class="info-label">File:</span>
        <span class="info-value" id="fileName">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Page:</span>
        <span class="info-value" id="pageName">-</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Quick Actions</div>
    <div class="quick-actions">
      <button class="quick-action" onclick="quickAction('get_file_info')" id="qa-info">
        <div class="quick-action-icon">📄</div>
        <div class="quick-action-label">Get Info</div>
      </button>
      <button class="quick-action" onclick="quickAction('get_pages')" id="qa-pages">
        <div class="quick-action-icon">📑</div>
        <div class="quick-action-label">List Pages</div>
      </button>
      <button class="quick-action" onclick="quickAction('get_variable_collections')" id="qa-vars">
        <div class="quick-action-icon">🎨</div>
        <div class="quick-action-label">Variables</div>
      </button>
      <button class="quick-action" onclick="quickAction('get_local_styles')" id="qa-styles">
        <div class="quick-action-icon">✨</div>
        <div class="quick-action-label">Styles</div>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Command Log</div>
    <div class="log-container" id="logContainer">
      <div class="empty-log">No commands received yet</div>
    </div>
  </div>

  <div class="footer">
    Bridge Server: ws://localhost:9876
  </div>

  <script>
    // ========================================================================
    // STATE
    // ========================================================================
    
    let logs = [];
    let fileInfo = null;
    let isConnected = false;
    
    // ========================================================================
    // CONNECTION CONTROLS (Tell main code to connect/disconnect)
    // ========================================================================
    
    function connect() {
      updateStatus('connecting');
      parent.postMessage({ pluginMessage: { type: 'connect' } }, '*');
    }
    
    function disconnect() {
      parent.postMessage({ pluginMessage: { type: 'disconnect' } }, '*');
    }
    
    // ========================================================================
    // QUICK ACTIONS (Send commands via main code)
    // ========================================================================
    
    function quickAction(command) {
      const id = `local-${Date.now()}`;
      addLog({ command, time: Date.now(), id });
      
      parent.postMessage({
        pluginMessage: {
          type: 'execute_command',
          id,
          command,
          payload: {}
        }
      }, '*');
    }
    
    // ========================================================================
    // UI UPDATES
    // ========================================================================
    
    function updateStatus(status) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      
      dot.classList.remove('connected');
      
      switch (status) {
        case 'connected':
          isConnected = true;
          dot.classList.add('connected');
          text.textContent = 'Connected';
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          break;
        case 'connecting':
          text.textContent = 'Connecting...';
          connectBtn.disabled = true;
          disconnectBtn.disabled = true;
          break;
        case 'error':
          isConnected = false;
          text.textContent = 'Error';
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          break;
        default:
          isConnected = false;
          text.textContent = 'Disconnected';
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
      }
    }
    
    function updateFileInfo(data) {
      fileInfo = data;
      document.getElementById('fileName').textContent = data.name || '-';
      document.getElementById('pageName').textContent = data.currentPage || '-';
    }
    
    function showError(message) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }
    
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }
    
    function addLog(entry) {
      logs.unshift(entry);
      if (logs.length > 50) logs.pop();
      renderLogs();
    }
    
    function updateLogResult(id, success, error) {
      const log = logs.find(l => l.id === id);
      if (log) {
        log.success = success;
        log.error = error;
        renderLogs();
      }
    }
    
    function renderLogs() {
      const container = document.getElementById('logContainer');
      
      if (logs.length === 0) {
        container.innerHTML = '<div class="empty-log">No commands received yet</div>';
        return;
      }

      container.innerHTML = logs.map(log => {
        const time = new Date(log.time).toLocaleTimeString();
        let statusClass = '';
        let statusIcon = '';
        
        if (log.success === true) {
          statusClass = 'log-success';
          statusIcon = '✓';
        } else if (log.success === false) {
          statusClass = 'log-error';
          statusIcon = '✗';
        }
        
        return `
          <div class="log-entry">
            <span class="log-time">${time}</span>
            <span class="log-command">${log.command}</span>
            ${statusIcon ? `<span class="${statusClass}"> ${statusIcon}</span>` : ''}
            ${log.error ? `<br><span class="log-error">${log.error}</span>` : ''}
          </div>
        `;
      }).join('');
    }
    
    // ========================================================================
    // PLUGIN MESSAGE HANDLER
    // ========================================================================
    
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
          case 'status':
          if (msg.connected) {
            updateStatus('connected');
          } else if (msg.error) {
            updateStatus('error');
            showError(msg.error);
          } else {
            updateStatus('disconnected');
          }
          break;
          
        case 'file_info':
          updateFileInfo(msg.data);
          // Try HTTP registration with orchestration server so it sees us even if WS is blocked
          registerHttp(msg.data).catch(e => {
            // don't block UI; show an error badge
            console.warn('HTTP register failed', e);
          });
          break;
          
        case 'log':
          addLog({ command: msg.command, time: Date.now(), id: `log-${Date.now()}` });
          break;
          
        case 'result':
          // Update logs
          const lastLog = logs.find(l => l.command === msg.command && l.success === undefined);
          if (lastLog) {
            lastLog.success = msg.success;
            lastLog.error = msg.error;
            renderLogs();
          }

          // If the result includes an id (commands originating from orchestration via HTTP poll), POST back to orchestration
          if (msg.id) {
            const resp = {
              id: msg.id,
              success: !!msg.success,
              data: msg.data || null,
              error: msg.error || null
            };

            // fire-and-forget POST to /response
            fetch('http://localhost:9877/response', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(resp)
            }).catch(e => console.warn('Failed to POST response to orchestration', e));
          }

          break;
      }
    };
    
    // ========================================================================
    // INITIALIZATION
    // ========================================================================
    
    // Request file info from plugin
    parent.postMessage({ pluginMessage: { type: 'get_file_info' } }, '*');

    // ========================================================================
    // STABLE HTTP CONNECTION SYSTEM
    // ========================================================================
    
    let pollInterval = null;
    let heartbeatInterval = null;
    let lastPollSuccess = Date.now();
    let connectionRetries = 0;
    const POLL_INTERVAL = 50;   // Poll every 50ms (near-instant pickup)
    const HEARTBEAT_INTERVAL = 5000;  // Heartbeat every 5s
    const MAX_POLL_FAILURES = 5;
    
    // Register with orchestration server
    async function registerHttp(fileInfo) {
      try {
        const res = await fetch('http://localhost:9877/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileInfo })
        });

        const data = await res.json();
        if (data && data.success) {
          updateStatus('connected');
          connectionRetries = 0;
          startPolling();
          startHeartbeat();
          hideError();
        }
      } catch (e) {
        console.warn('registerHttp error', e);
        connectionRetries++;
        if (connectionRetries < 10) {
          setTimeout(() => registerHttp(fileInfo), 2000);
        } else {
          showError('Failed to connect to server after 10 attempts');
          updateStatus('error');
        }
      }
    }

    // Poll for commands
    async function pollLoop() {
      try {
        const res = await fetch('http://localhost:9877/poll', { 
          signal: AbortSignal.timeout(5000) 
        });
        const data = await res.json();
        lastPollSuccess = Date.now();
        connectionRetries = 0;
        
        if (!isConnected) {
          updateStatus('connected');
          hideError();
        }
        
        if (data.hasCommand) {
          // Batch mode: server returns { batch: [...commands] }
          const commands = data.batch || [data];
          console.log('[poll] Received ' + commands.length + ' command(s)');
          for (let i = 0; i < commands.length; i++) {
            const cmd = commands[i];
            parent.postMessage({
              pluginMessage: {
                type: 'execute_command',
                id: cmd.id,
                command: cmd.command,
                payload: cmd.payload || {}
              }
            }, '*');
            addLog({ command: cmd.command, time: Date.now(), id: cmd.id });
          }
        }
      } catch (e) {
        console.warn('[poll] error:', e);
        connectionRetries++;
        
        if (connectionRetries >= MAX_POLL_FAILURES) {
          updateStatus('error');
          showError('Lost connection to server. Attempting to reconnect...');
          stopPolling();
          // Try to re-register
          setTimeout(() => {
            connectionRetries = 0;
            parent.postMessage({ pluginMessage: { type: 'get_file_info' } }, '*');
          }, 3000);
        }
      }
    }

    // Heartbeat to keep connection alive AND ensure polling continues
    async function heartbeat() {
      try {
        const res = await fetch('http://localhost:9877/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            fileInfo: fileInfo || { name: 'Unknown', currentPage: 'Unknown' },
            heartbeat: true 
          })
        });
        const data = await res.json();
        if (data && data.success) {
          lastPollSuccess = Date.now();
          // CRITICAL: Restart polling if it stopped
          if (!pollInterval) {
            console.log('[heartbeat] Polling was stopped, restarting...');
            startPolling();
          }
        }
      } catch (e) {
        console.warn('[heartbeat] error:', e);
      }
    }

    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(pollLoop, POLL_INTERVAL);
      pollLoop(); // Initial poll
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    function startHeartbeat() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      heartbeatInterval = setInterval(heartbeat, HEARTBEAT_INTERVAL);
    }

    function stopHeartbeat() {
      if (heartbeatInterval) {
        clearInterval(heartbeatInterval);
        heartbeatInterval = null;
      }
    }

    // Handle page visibility changes - keep polling even when hidden
    document.addEventListener('visibilitychange', () => {
      console.log('[visibility] Document visibility:', document.visibilityState);
      if (document.visibilityState === 'visible') {
        // Page became visible - ensure polling is active
        if (!pollInterval && isConnected) {
          startPolling();
        }
        // Also re-register to refresh connection
        if (fileInfo) {
          registerHttp(fileInfo);
        }
      }
    });

    // Handle window focus/blur
    window.addEventListener('focus', () => {
      console.log('[focus] Window gained focus');
      if (!pollInterval && fileInfo) {
        registerHttp(fileInfo);
      }
    });

    // Prevent polling from stopping - check every 10s
    setInterval(() => {
      if (isConnected && !pollInterval) {
        console.log('[watchdog] Polling stopped, restarting...');
        startPolling();
      }
      
      // Check if we haven't had a successful poll in 30s
      if (isConnected && Date.now() - lastPollSuccess > 30000) {
        console.log('[watchdog] No successful poll in 30s, reconnecting...');
        updateStatus('error');
        stopPolling();
        stopHeartbeat();
        connectionRetries = 0;
        if (fileInfo) {
          registerHttp(fileInfo);
        }
      }
    }, 10000);

    // Start initial connection
    parent.postMessage({ pluginMessage: { type: 'get_file_info' } }, '*');
  </script>
</body>
</html>
