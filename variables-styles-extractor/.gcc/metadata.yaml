# Plugin-level metadata for Variables & Styles Extractor
# Workspace metadata lives in ../.gcc/metadata.yaml

name: variables-styles-extractor
kind: figma-plugin
status: published
phase: maintenance

repository:
  owner: tknatwork
  name: side-kicks
  path_within: variables-styles-extractor
  default_branch: main

figma:
  community_id: "1584331992332668732"
  community_slug: variables-and-styles-extractor
  community_url: https://www.figma.com/community/plugin/1584331992332668732/variables-and-styles-extractor
  editor_type: figma

versions:
  published: "2.0.0"
  published_date: "2026-01-17"
  dev: "2.0.0"

ui:
  window_width: 1200
  window_height: 628
  layout: 4-column

runtime:
  backend: quickjs-vm-es2017
  frontend: browser-iframe

build:
  package_manager: pnpm
  build_command: pnpm build
  build_dev_command: pnpm build:dev
  watch_command: pnpm watch
  output_files:
    - code.js     # compiled + minified
    - ui.html     # source (no compilation)
    - manifest.json
  ci_pipeline: none  # source ships pre-built; no GitHub Actions build

license:
  source: MIT
  distribution: figma-community-free-resource-license

network_access:
  allowed_domains: none

permissions:
  - currentuser

last_updated: 2026-05-22
