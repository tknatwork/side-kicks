# Workspace-level metadata for Side-Kicks
# Per-project metadata lives in each project's .gcc/metadata.yaml

name: side-kicks
kind: workspace
visibility: public
repository: https://github.com/tknatwork/side-kicks
default_branch: main

# Workspace phase tracks AI structure + repo health, not code maturity
phase: ai-structure-adopted

# Projects this workspace owns (kept in sync with AGENTS.md project table)
projects:
  - name: variables-styles-extractor
    path: variables-styles-extractor
    kind: figma-plugin
    status: published
    figma_community_id: "1584331992332668732"
    figma_community_slug: variables-and-styles-extractor
    published_version: "2.0.0"
    license: MIT
    distribution_license: figma-community-free-resource-license

  - name: nectar-design-toolkit
    path: nectar-design-toolkit
    kind: design-system-toolkit
    status: active-development
    license: MIT

  - name: design-system-builder
    path: Design System Builder
    kind: design-system-toolkit
    status: active-development
    license: MIT

# Security posture
security:
  branch_protection: enabled
  codeowners: enabled
  dependabot_alerts: enabled
  dependabot_security_updates: enabled
  secret_scanning: enabled
  secret_scanning_push_protection: enabled
  code_scanning_codeql: enabled
  ghas_features:  # require paid plan; not available on free tier
    secret_scanning_non_provider_patterns: unavailable-on-plan
    secret_scanning_validity_checks: unavailable-on-plan

last_updated: 2026-05-22
