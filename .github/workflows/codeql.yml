# CodeQL security scanning
# https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning
#
# Scans JavaScript/TypeScript for known vulnerability patterns (XSS,
# injection, prototype pollution, etc.) and publishes findings to the
# Security tab. Requires "Code scanning" to be enabled in
# Settings -> Code security and analysis.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC - catches new CVE patterns even if no commits
    - cron: "0 6 * * 1"

# Minimum permissions for the workflow (defense in depth)
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write   # required to upload scan results
      packages: read           # required to fetch internal CodeQL packs
      actions: read            # required for private repos

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use security-extended for stronger ruleset (default is "security")
          queries: security-extended
          # Root extraction in the plugin folder so docs-only PRs still
          # have JS/TS to extract. Without this, CodeQL's diff-informed
          # autobuilder sees no source on YAML+MD diffs and exits with
          # "no source code seen during build" (exit 32). After the
          # 2026-06-06 deletion of Design System Builder/ and
          # nectar-design-toolkit/, the plugin folder is the only
          # location with JS/TS in the repo.
          source-root: variables-styles-extractor
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
